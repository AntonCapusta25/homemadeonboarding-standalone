<!DOCTYPE html>
<html>

<head>
    <title>Test CORS SSE Connection</title>
    <style>
        body {
            font-family: monospace;
            padding: 20px;
            background: #1e1e1e;
            color: #d4d4d4;
        }

        #log {
            background: #252526;
            padding: 15px;
            border-radius: 5px;
            white-space: pre-wrap;
            max-height: 600px;
            overflow-y: auto;
        }

        .success {
            color: #4ec9b0;
        }

        .error {
            color: #f48771;
        }

        .info {
            color: #569cd6;
        }

        button {
            background: #0e639c;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 3px;
            cursor: pointer;
            margin: 10px 5px;
        }

        button:hover {
            background: #1177bb;
        }
    </style>
</head>

<body>
    <h1>CORS SSE Connection Test</h1>
    <div>
        <button onclick="testLocal()">Test Local (localhost:8787)</button>
        <button onclick="testVercel()">Test Vercel Production</button>
        <button onclick="clearLog()">Clear Log</button>
    </div>
    <div id="log"></div>

    <script>
        const log = document.getElementById('log');

        function addLog(message, type = 'info') {
            const timestamp = new Date().toISOString().split('T')[1].slice(0, -1);
            log.innerHTML += `<span class="${type}">[${timestamp}] ${message}</span>\n`;
            log.scrollTop = log.scrollHeight;
        }

        function clearLog() {
            log.innerHTML = '';
        }

        function testSSE(url, label) {
            addLog(`\n=== Testing ${label} ===`, 'info');
            addLog(`URL: ${url}`, 'info');

            try {
                const eventSource = new EventSource(url);

                eventSource.onopen = () => {
                    addLog('✅ Connection opened successfully!', 'success');
                };

                eventSource.addEventListener('endpoint', (e) => {
                    addLog(`✅ Received 'endpoint' event: ${e.data}`, 'success');
                });

                eventSource.addEventListener('message', (e) => {
                    addLog(`📨 Received 'message' event: ${e.data}`, 'success');
                });

                eventSource.onerror = (error) => {
                    addLog(`❌ Error: ${error.type || 'Connection failed'}`, 'error');
                    addLog(`ReadyState: ${eventSource.readyState} (0=CONNECTING, 1=OPEN, 2=CLOSED)`, 'error');
                    eventSource.close();
                };

                // Auto-close after 5 seconds
                setTimeout(() => {
                    if (eventSource.readyState === 1) {
                        addLog('✅ Connection still alive after 5s, closing...', 'success');
                        eventSource.close();
                    }
                }, 5000);

            } catch (error) {
                addLog(`❌ Exception: ${error.message}`, 'error');
            }
        }

        function testLocal() {
            testSSE('http://localhost:8787/sse', 'Local Server');
        }

        function testVercel() {
            testSSE('https://homemadeonboarding-standalone.vercel.app/api/sse', 'Vercel Production');
        }

        // Auto-test on load
        addLog('🚀 CORS SSE Test Page Loaded', 'info');
        addLog('Click buttons above to test connections', 'info');
    </script>
</body>

</html>
